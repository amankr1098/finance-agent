# Global values — automatically passed from the umbrella chart.
# Set these here only when deploying this sub-chart standalone.
global:
  baseDomain: ""             # e.g. apps.i40sno-acm.mavdallab.com
  backendSubdomain: finance-agent-api
  frontendSubdomain: finance-agent
  # Set to true when deploying to multiple namespaces on the same cluster.
  # Appends the release namespace to the route hostname to avoid conflicts:
  #   finance-agent-api-<namespace>.<baseDomain>
  namespaceInHost: false

replicaCount: 1

image:
  repository: finance-agent-backend
  pullPolicy: IfNotPresent
  # Override with your registry tag, e.g. "v1.2.0" or a git SHA
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

# OpenShift SCCs assign an arbitrary UID from the namespace range, so we must
# NOT pin runAsUser or fsGroup here — the Dockerfile.openshift already handles
# arbitrary-UID access via `chgrp -R 0 && chmod -R g=u`.
podSecurityContext:
  runAsNonRoot: true

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  annotations: {}

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 15
  periodSeconds: 20
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

nodeSelector: {}
tolerations: []
affinity: {}

# ---------------------------------------------------------------------------
# Non-sensitive environment variables (stored in a ConfigMap)
# ---------------------------------------------------------------------------
env:
  PORT: "8000"
  NODE_ENV: "production"
  BACKEND_URL: ""
  FRONTEND_URL: ""
  FIREBASE_PROJECT_ID: ""
  SHEET_ID: ""

# ---------------------------------------------------------------------------
# Sensitive environment variables (stored in a Secret)
# ---------------------------------------------------------------------------
secrets:
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  GOOGLE_REFRESH_TOKEN: ""
  GEMINI_API_KEY: ""
  OPENROUTER_API_KEY: ""
  FIREBASE_SERVICE_ACCOUNT_JSON: ""
  APP_SECRET: ""

# Reference a pre-existing Secret instead of creating one from secrets above
existingSecret: ""
