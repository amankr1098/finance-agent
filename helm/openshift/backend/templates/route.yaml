{{- if .Values.ingress.enabled -}}
{{- $fullName := include "finance-agent-backend.fullname" . -}}
{{- $svcPort := .Values.service.port -}}
{{- $baseDomain := .Values.global.baseDomain | default "" -}}
{{- $subdomain := .Values.global.backendSubdomain | default "finance-agent-api" -}}
{{- $computedHost := printf "%s.%s" $subdomain $baseDomain -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "finance-agent-backend.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ $computedHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: {{ $svcPort }}
{{- end }}
