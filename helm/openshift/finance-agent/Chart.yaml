apiVersion: v2
name: finance-agent-openshift
description: >
  Umbrella Helm chart that deploys the complete Finance Agent stack on OpenShift —
  backend (Node.js/Express) and frontend (React/nginx-unprivileged) — as a single release.
  Uses OpenShift Routes, drops pinned UIDs for SCC compatibility, and targets port 8080
  on the frontend (nginxinc/nginx-unprivileged).
type: application
version: 0.1.0
appVersion: "1.0.0"
keywords:
  - finance
  - agent
  - fullstack
  - openshift
maintainers:
  - name: finance-agent

# Sub-charts are resolved from the sibling directories.
# Run `helm dependency update helm/openshift/finance-agent` to package them into charts/.
dependencies:
  - name: finance-agent-backend
    version: "0.1.0"
    repository: "file://../backend"
    alias: backend
  - name: finance-agent-frontend
    version: "0.1.0"
    repository: "file://../frontend"
    alias: frontend
