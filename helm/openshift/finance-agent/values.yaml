# ===========================================================================
# Finance Agent — OpenShift Umbrella Chart Values
#
# !! CHANGE THIS ONE VALUE TO DEPLOY TO A DIFFERENT DOMAIN !!
#
#   global.baseDomain — the wildcard apps domain of your OpenShift cluster.
#   All Route hostnames are derived from it automatically:
#     backend  → https://finance-agent-api.<baseDomain>
#     frontend → https://finance-agent.<baseDomain>
#
# MULTI-NAMESPACE DEPLOYMENTS (dev / staging / prod on the same cluster):
#   OpenShift only allows ONE namespace to own a given Route hostname.
#   Set global.namespaceInHost=true so each namespace gets a unique host:
#     backend  → https://finance-agent-api-<namespace>.<baseDomain>
#     frontend → https://finance-agent-<namespace>.<baseDomain>
#
#   helm install finance-agent helm/openshift/finance-agent \
#     -n finance-agent-dev --create-namespace \
#     --set global.namespaceInHost=true
#
# Pre-requisites:
#   1. Build images with Dockerfile.openshift (not Dockerfile).
#   2. Push to your registry and set image.repository / image.tag below.
#   3. Run: helm dependency update helm/openshift/finance-agent
#
# Deploy (single namespace):
#   helm install finance-agent helm/openshift/finance-agent \
#     -n <namespace> --create-namespace
# ===========================================================================

# ---------------------------------------------------------------------------
# SINGLE SOURCE OF TRUTH — change only this block to move environments
# ---------------------------------------------------------------------------
global:
  baseDomain: apps.i40sno-acm.mavdallab.com
  # Subdomain prefixes (change if you want different hostnames)
  backendSubdomain: finance-agent-api
  frontendSubdomain: finance-agent
  # Set to true when deploying to multiple namespaces on the same cluster.
  # Appends the release namespace to each route hostname to prevent conflicts:
  #   false (default) → finance-agent-api.<baseDomain>
  #   true            → finance-agent-api-<namespace>.<baseDomain>
  namespaceInHost: false

# ---------------------------------------------------------------------------
# Backend sub-chart overrides  (alias: backend)
# ---------------------------------------------------------------------------
backend:
  replicaCount: 1

  image:
    repository: finance-agent-backend
    pullPolicy: IfNotPresent
    tag: "latest"

  service:
    type: ClusterIP
    port: 8000

  # OpenShift Route (edge TLS via cluster wildcard cert)
  ingress:
    enabled: true
    annotations: {}

  # Non-sensitive runtime config
  env:
    PORT: "8000"
    NODE_ENV: "production"
    # BACKEND_URL and FRONTEND_URL are computed from global.baseDomain in the configmap template
    FIREBASE_PROJECT_ID: ""
    SHEET_ID: ""

  # Sensitive values — override with --set or an external secret manager
  secrets:
    GOOGLE_CLIENT_ID: ""
    GOOGLE_CLIENT_SECRET: ""
    GOOGLE_REFRESH_TOKEN: ""
    GEMINI_API_KEY: ""
    OPENROUTER_API_KEY: ""
    FIREBASE_SERVICE_ACCOUNT_JSON: ""
    APP_SECRET: ""

  # Reference a pre-existing Secret instead of creating one from secrets above
  existingSecret: ""

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80

# ---------------------------------------------------------------------------
# Frontend sub-chart overrides  (alias: frontend)
# ---------------------------------------------------------------------------
frontend:
  replicaCount: 1

  image:
    repository: finance-agent-frontend
    pullPolicy: IfNotPresent
    tag: "latest"

  # nginx-unprivileged listens on 8080
  service:
    type: ClusterIP
    port: 8080

  # OpenShift Route (edge TLS via cluster wildcard cert)
  ingress:
    enabled: true
    annotations: {}

  # Runtime config injected into /config.js by entrypoint.sh
  # API_BASE_URL is computed from global.baseDomain in the configmap template
  config:
    FIREBASE_API_KEY: ""
    FIREBASE_AUTH_DOMAIN: ""
    FIREBASE_PROJECT_ID: ""
    FIREBASE_STORAGE_BUCKET: ""
    FIREBASE_MESSAGING_SENDER_ID: ""
    FIREBASE_APP_ID: ""

  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
