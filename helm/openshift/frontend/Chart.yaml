apiVersion: v2
name: finance-agent-frontend
description: >
  Helm chart for the Finance Agent frontend (React/nginx-unprivileged) — OpenShift edition.
  Uses OpenShift Routes instead of Ingress, port 8080 (nginxinc/nginx-unprivileged),
  and drops runAsUser/fsGroup so OpenShift SCCs can assign an arbitrary UID.
type: application
version: 0.1.0
appVersion: "1.0.0"
keywords:
  - finance
  - agent
  - frontend
  - react
  - nginx
  - openshift
maintainers:
  - name: finance-agent
